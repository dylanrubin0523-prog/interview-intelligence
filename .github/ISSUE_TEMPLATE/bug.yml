name: Bug
description: Report incorrect behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, or errors
  - type: textarea
    id: risk
    attributes:
      label: Security, privacy, or data-loss risk
